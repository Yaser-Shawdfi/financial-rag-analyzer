[server]
bind_addr = "127.0.0.1:3000"
max_connections = 1000
request_timeout_secs = 120
max_body_size_mb = 100
cors_origins = ["*"]

[ollama]
url = "http://localhost:11434"
embedding_model = "nomic-embed-text"
llm_model = "llama3.1:8b"
embedding_batch_size = 10
request_timeout_secs = 120

[rag]
chunk_size = 800
chunk_overlap = 150
top_k = 5
min_score = 0.15
max_context_tokens = 4096
system_prompt = "You are a financial document analyst. Answer the user's question based ONLY on the provided context from financial filings. Rules: 1. If the answer is not in the context, say 'This information is not available in the provided document.' 2. Cite the source section for each claim. 3. For numerical data, present it clearly. 4. Do not make assumptions or use external knowledge."

[auth]
enabled = false
jwt_secret = "change-me-in-production"
jwt_expiry_hours = 24
rate_limit_per_minute = 60

[storage]
sled_path = "./data/vectors.sled"
vector_cache_size_mb = 256